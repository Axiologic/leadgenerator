<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Generator & Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lead Generator</h1>
        <nav>
            <button data-tab="discovery" class="active">Discovery</button>
            <button data-tab="projects">Projects</button>
            <button data-tab="investors">Investors</button>
            <button data-tab="scraper">Scraper</button>
            <button data-tab="leads">Leads</button>
            <button data-tab="settings">Settings</button>
        </nav>
    </header>
    <main id="content"></main>

    <template id="discovery-template">
        <section>
            <h2>Lead Discovery</h2>
            <div class="form-group">
                <label for="discovery-topic">Search Topic:</label>
                <div class="input-with-btn">
                    <input type="text" id="discovery-topic" placeholder="e.g., European AI Research Projects">
                    <button id="start-discovery">Search</button>
                    <button id="suggest-topics" class="btn-secondary">Suggest</button>
                    <button id="ideas-btn" class="btn-secondary">💡 Ideas</button>
                </div>
            </div>
            <div id="search-history" class="suggestions" style="display:none"></div>
            <div id="topic-suggestions" class="suggestions" style="display:none"></div>
            <div id="ideas-panel" class="ideas-panel" style="display:none"></div>
            <div id="discovery-results" class="results-area"></div>
        </section>
    </template>

    <template id="projects-template">
        <section>
            <h2>Projects & Consortiums</h2>
            <p class="muted">Collect research projects, consortiums, associations, and industry groups. Then extract leads (people & companies) from their partner pages.</p>
            <div id="projects-list"></div>
            <div id="project-leads-area" class="results-area" style="margin-top:1rem"></div>
        </section>
    </template>

    <template id="investors-template">
        <section>
            <h2>Investors & Funding</h2>
            <p class="muted">Organizations that invest in or fund projects in your area. Saved from Discovery results.</p>
            <div id="investors-list"></div>
        </section>
    </template>

    <template id="scraper-template">
        <section>
            <h2>Recursive Scraper</h2>
            <p class="muted">Scrapes pages recursively, extracts leads. Supports HTML, PDF, and DOCX.</p>
            <div class="form-group">
                <label for="scraper-url">Starting URL:</label>
                <input type="url" id="scraper-url" placeholder="https://example.com">
            </div>
            <div id="scraper-history" class="suggestions" style="display:none"></div>
            <div class="form-group">
                <label for="scraper-depth">Depth:</label>
                <input type="number" id="scraper-depth" value="2" min="1" max="5">
            </div>
            <div class="flex-row">
                <button id="start-scraper">Start Scraper</button>
                <button id="continue-scraper" class="btn-secondary" style="display:none">Continue →</button>
                <span id="scraper-status" class="muted"></span>
            </div>
            <div id="scraper-results" class="results-area"></div>
        </section>
    </template>

    <template id="leads-template">
        <section>
            <h2>Lead Management</h2>
            <div class="leads-toolbar">
                <div class="leads-filter">
                    <label>Filter:</label>
                    <select id="filter-status">
                        <option value="">All</option>
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Not Interested">Not Interested</option>
                    </select>
                    <select id="filter-type">
                        <option value="">All Types</option>
                        <option value="person">Person</option>
                        <option value="organization">Organization</option>
                        <option value="investor">Investor</option>
                    </select>
                </div>
                <div class="flex-row">
                    <span id="leads-count" class="muted"></span>
                    <button id="export-leads-btn" class="btn-secondary" style="font-size:0.8rem;padding:0.3rem 0.7rem">Export</button>
                    <button id="import-leads-btn" class="btn-secondary" style="font-size:0.8rem;padding:0.3rem 0.7rem">Import</button>
                    <input type="file" id="import-leads-file" accept=".json" style="display:none">
                </div>
            </div>
            <div id="import-status"></div>
            <div id="leads-list"></div>
        </section>
    </template>

    <template id="settings-template">
        <section>
            <h2>Settings</h2>
            <div class="settings-group">
                <h3>LLM Configuration</h3>
                <div id="llm-settings"></div>
            </div>
            <div class="settings-group">
                <h3>Scoring Keywords</h3>
                <p class="muted">Keywords and their scores used for lead prioritization.</p>
                <div id="scoring-settings"></div>
                <div class="input-with-btn" style="margin-top:0.5rem">
                    <input type="text" id="new-keyword" placeholder="keyword">
                    <input type="number" id="new-keyword-score" placeholder="score" value="10" style="width:80px">
                    <button id="add-keyword" class="btn-secondary">Add</button>
                </div>
            </div>
            <div class="settings-group">
                <h3>Contact Template</h3>
                <p class="muted">Describe your offer and contact intention. This is used to score leads and generate personalized messages.</p>
                <textarea id="contact-template" rows="6" placeholder="Example: We are a research automation company specializing in AI-powered literature review and knowledge extraction. We help EU project consortiums automate their research workflows. We're looking for partners and coordinators for upcoming Horizon Europe calls."></textarea>
            </div>
            <div class="settings-group">
                <h3>Password</h3>
                <div class="input-with-btn">
                    <input type="password" id="current-password" placeholder="Current password" style="width:auto">
                    <input type="password" id="new-password" placeholder="New password" style="width:auto">
                    <button id="change-password-btn" class="btn-secondary">Change</button>
                </div>
                <span id="password-status" class="muted"></span>
            </div>
        </section>
    </template>
    <div id="lead-modal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="document.getElementById('lead-modal').style.display='none'">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
